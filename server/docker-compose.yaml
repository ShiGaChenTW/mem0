services:
  mem0:
    build:
      context: https://github.com/ShiGaChenTW/mem0.git#main
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=mem0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mem0pass
      - POSTGRES_DB=mem0
      - DATABASE_URL=postgresql://postgres:mem0pass@mem0-postgres:5432/mem0
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DISABLED=false
      - MEM0_TELEMETRY=false
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      mem0-postgres:
        condition: service_healthy
    restart: unless-stopped

  mem0-postgres:
    image: ankane/pgvector:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mem0pass
      - POSTGRES_DB=mem0
    volumes:
      - mem0-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mem0-postgres-data:
